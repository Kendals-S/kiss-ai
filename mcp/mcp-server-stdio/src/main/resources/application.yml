server:
  port: 8081
  servlet:
    context-path: /kissAi/stdio
    encoding:
      charset: UTF-8
      enabled: true
      force: true

spring:
  application:
    name: mcpStdio
  main:
    web-application-type: none
    banner-mode: off
  ai:
    mcp:
      server:
        name: mcp-service
        version: 1.0.0
        stdio: true
        enabled: true
        type: SYNC

logging:
  level:
    root: off